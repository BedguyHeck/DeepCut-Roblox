<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<h1>🎮 My AI Hub</h1>

<nav>
  <button class="active" data-tab="chat">AI Chat</button>
  <button data-tab="games">Roblox Finder</button>
</nav>

<!-- CHAT -->
<section id="chat" class="panel active">
  <div class="chat-box">

    <div id="output-area"></div>

    <form id="chat-form" class="row">
      <input id="user-input" type="text" placeholder="Ask something..." autocomplete="off"/>
      <button class="send" type="submit">Send</button>
    </form>

  </div>
</section>

<!-- GAMES -->
<section id="games" class="panel">
  <div class="search-container">
    <select id="genreSelect">
      <option value="">Select a genre...</option>
      <option value="horror">Horror</option>
      <option value="rpg">RPG</option>
      <option value="survival">Survival</option>
      <option value="tycoon">Tycoon</option>
      <option value="simulator">Simulator</option>
    </select>

    <button id="searchBtn">Search</button>
  </div>

  <div id="results" class="results"></div>
</section>

<script src="script.js"></script>
</body>
</html>
